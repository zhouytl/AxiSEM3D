name: Compile

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  linux-conda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: 3.11
          environment-file: environment.yml
          activate-environment: axisem3d
          use-mamba: true
      - name: Conda info
        shell: bash -el {0}
        run: conda info
      - name: Configure
        run: |
          source $CONDA/etc/profile.d/conda.sh && conda activate axisem3d
          conda install -n axisem3d conda-forge::numdiff
          cmake -B build \
            -Dcxx=mpicxx \
            -Dhdf5=$CONDA_PREFIX \
            -Dnetcdf=$CONDA_PREFIX \
            -Deigen=$CONDA_PREFIX \
            -Dboost=$CONDA_PREFIX \
            -Dfftw=$CONDA_PREFIX \
            -Dmetis=$CONDA_PREFIX

      - name: Build
        run: |
          source $CONDA/etc/profile.d/conda.sh && conda activate axisem3d
          cmake --build build -j4

      - name: Check executable
        run: ./build/axisem3d --help

      - name: Run tests
        run: |
          source $CONDA/etc/profile.d/conda.sh && conda activate axisem3d
          cd build && ctest -j2 --output-on-failure

      - name: Indent
        run: |
          source $CONDA/etc/profile.d/conda.sh && conda activate axisem3d
          ./tools/indent.sh
          # fail if git shows any changes:
          git diff --exit-code && echo "No changes after indenting." || exit 1

      - name: test mesher
        run: |
          source $CONDA/etc/profile.d/conda.sh && conda activate axisem3d
          python -m salvus_mesh_lite.interface AxiSEM
