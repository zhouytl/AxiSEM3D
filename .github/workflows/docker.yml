name: github-main

on: 
  push: 
    branches:
      - 'main'
  release:
    types: [published] 

# If a merged PR triggers a rebuild of this docker image, and another
# PR is merged during the build, cancel the first of these since (i) this
# is a waste of time, and (ii) it creates a race condition with the
# upload.
concurrency:
  group: docker-build
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-docker:
    runs-on: ubuntu-latest
    if: github.repository == 'AxiSEMunity/AxiSEM3D'
    steps:  
      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
  
      - name: Build and push Docker image
        uses: docker/build-push-action@v6 
        with:
          context: ./
          file: docker/Dockerfile
          cache-from: type=registry,ref=ubuntu:25.10
          cache-to: type=inline
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{secrets.DOCKERHUB_USERNAME}}/${{ secrets.DOCKERHUB_PROJECT_NAME}}
